<text x="60" y="640" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#17202a">Ornith Q5_K_M - 174.6K prompt</text>
<text x="60" y="660" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">cold prefill 860.6s, full one-shot 917.4s</text>
<rect x="360" y="630" width="664.1" height="17" rx="3" fill="#0f8a73"/>
<text x="1032.1" y="643" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="650" fill="#17202a">202.92</text>
<text x="720.0" y="738" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5e6b78">prompt tokens per second</text>
<text x="42" y="772" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">Long-context generation: Q4_K_M 18.37 tok/s, Q5_K_M 18.03 tok/s. Cold prefill: Q4_K_M 197.44 tok/s, Q5_K_M 202.92 tok/s.</text>
<text x="42" y="792" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">Source: raw Ornith benchmark CSVs under results/ornith-1.0-35b-gguf/.</text>
