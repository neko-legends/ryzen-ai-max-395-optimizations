<rect x="42" y="556" width="1086" height="50" rx="6" fill="#f7f9fb"/>
<text x="60" y="582" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#17202a">Ornith Q4_K_M - 174.6K prompt</text>
<text x="60" y="602" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">cold prefill 884.5s, full one-shot 940.2s</text>
<rect x="360" y="572" width="646.2" height="17" rx="3" fill="#2468c9"/>
