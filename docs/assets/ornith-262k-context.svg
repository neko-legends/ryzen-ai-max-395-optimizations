<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="840" viewBox="0 0 1180 840" role="img" aria-labelledby="title desc">
<title id="title">Ornith 1.0 35B context benchmark on Ryzen AI Max+ 395</title>
<desc id="desc">Two-panel bar chart showing Ornith Q4 and Q5 generation throughput at short and 174K context, plus cold prefill speed for the 174K prompt fixture.</desc>
<rect width="1180" height="840" fill="#fbfcfd"/>
<rect x="20" y="20" width="1140" height="800" rx="8" fill="#ffffff" stroke="#e5ebf0"/>
<text x="42" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#17202a">Ornith 1.0 35B 262K context findings</text>
<text x="42" y="91" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#5e6b78">Ryzen AI Max+ 395 / Radeon 8060S, Windows HIP/ROCm, llama.cpp, no MTP, f16 KV, t28 ub1024</text>
<text x="42" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5e6b78">Cold 174K fixture results are split into prefill and generation. Full one-shot wall tok/s is intentionally not charted as steady throughput.</text>
<rect x="875" y="53" width="14" height="14" rx="2" fill="#2468c9"/>
<text x="897" y="65" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#17202a">Q4_K_M</text>
<rect x="875" y="78" width="14" height="14" rx="2" fill="#0f8a73"/>
<text x="897" y="90" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#17202a">Q5_K_M</text>
<text x="42" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#17202a">Generation speed</text>
<text x="42" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5e6b78">Eval tok/s only. This is the output speed after prompt processing.</text>
<line x1="360.0" y1="196" x2="360.0" y2="448" stroke="#d8e0e8" stroke-width="1"/>
<text x="360.0" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">0</text>
<line x1="540.0" y1="196" x2="540.0" y2="448" stroke="#d8e0e8" stroke-width="1"/>
<text x="540.0" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">10</text>
