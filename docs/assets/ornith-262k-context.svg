<text x="720.0" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">20</text>
<line x1="900.0" y1="196" x2="900.0" y2="448" stroke="#d8e0e8" stroke-width="1"/>
<text x="900.0" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">30</text>
<line x1="1080.0" y1="196" x2="1080.0" y2="448" stroke="#d8e0e8" stroke-width="1"/>
<text x="1080.0" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#5e6b78">40</text>
