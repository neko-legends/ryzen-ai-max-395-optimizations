<text x="42" y="91" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#5e6b78">AMD Ryzen AI Max+ 395 chipset / Radeon 8060S, Windows HIP/ROCm, Unsloth llama.cpp, MTP n=2, f16 KV</text>
<text x="42" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5e6b78">The 623.2 tok/s result is 10K prompt prefill, not generated-output speed. Decode was 40.5 tok/s at 10K and 23.9 tok/s at 200K.</text>
